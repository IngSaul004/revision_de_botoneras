<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Validador de Flujos de Producción</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #f5f5f4;
        color: #1c1c1a;
        font-size: 14px;
      }
      .topbar {
        background: #fff;
        border-bottom: 1px solid #e5e5e3;
        padding: 14px 24px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .topbar h1 {
        font-size: 16px;
        font-weight: 500;
      }
      .main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 16px;
      }
      .config-box {
        background: #fff;
        border: 1px solid #e5e5e3;
        border-radius: 10px;
        padding: 16px 20px;
        margin-bottom: 20px;
        display: grid;
        grid-template-columns: auto 1fr auto auto;
        gap: 8px;
        align-items: end;
      }
      .config-box label {
        font-size: 11px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        display: block;
        margin-bottom: 4px;
      }
      .config-box input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 13px;
        background: #fff;
      }
      .config-box input:focus {
        outline: none;
        border-color: #888;
      }
      .btn {
        padding: 8px 18px;
        border: 1px solid #ccc;
        border-radius: 8px;
        background: #fff;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.15s;
        white-space: nowrap;
      }
      .btn:hover {
        background: #f1efea;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-primary {
        background: #1c1c1a;
        color: #fff;
        border-color: #1c1c1a;
      }
      .btn-primary:hover {
        background: #333;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 10px;
        margin-bottom: 20px;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e5e3;
        border-radius: 10px;
        padding: 14px 16px;
      }
      .card-label {
        font-size: 11px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 6px;
      }
      .card-val {
        font-size: 26px;
        font-weight: 500;
      }
      .card-val.ok {
        color: #3b6d11;
      }
      .card-val.err {
        color: #a32d2d;
      }
      .card-val.warn {
        color: #854f0b;
      }
      .card-val.neutral {
        color: #1c1c1a;
      }
      .status-bar {
        background: #fff;
        border: 1px solid #e5e5e3;
        border-radius: 8px;
        padding: 10px 14px;
        margin-bottom: 16px;
        font-size: 13px;
        color: #555;
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 40px;
      }
      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid #ddd;
        border-top-color: #555;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .tab {
        padding: 6px 16px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #fff;
        font-size: 12px;
        cursor: pointer;
        color: #888;
      }
      .tab.active {
        background: #1c1c1a;
        color: #fff;
        border-color: #1c1c1a;
      }
      .table-wrap {
        overflow-x: auto;
        background: #fff;
        border: 1px solid #e5e5e3;
        border-radius: 10px;
        margin-bottom: 20px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      th {
        text-align: left;
        padding: 10px 12px;
        border-bottom: 1px solid #e5e5e3;
        color: #888;
        font-weight: 500;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        white-space: nowrap;
      }
      td {
        padding: 9px 12px;
        border-bottom: 1px solid #f0f0ee;
        vertical-align: top;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr.row-err {
        background: #fff8f8;
      }
      tr.row-warn {
        background: #fffbf4;
      }
      tr.row-dead {
        background: #f5f5f4;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        font-size: 11px;
        font-weight: 500;
        padding: 2px 8px;
        border-radius: 99px;
        white-space: nowrap;
      }
      .badge-err {
        background: #fcebeb;
        color: #791f1f;
      }
      .badge-warn {
        background: #faeeda;
        color: #633806;
      }
      .badge-dead {
        background: #d3d1c7;
        color: #444441;
      }
      .badge-ok {
        background: #eaf3de;
        color: #27500a;
      }
      .evento-cell {
        word-break: break-all;
        font-size: 12px;
        font-family: monospace;
        max-width: 380px;
      }
      .nota-cell {
        font-size: 12px;
        color: #666;
        max-width: 260px;
      }
      .fecha-cell {
        white-space: nowrap;
        font-size: 12px;
        color: #888;
      }
      .empty-state {
        text-align: center;
        padding: 40px;
        color: #aaa;
        font-size: 13px;
      }
      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .proceso-group {
        background: #fff;
        border: 1px solid #e5e5e3;
        border-radius: 10px;
        margin-bottom: 16px;
        overflow: hidden;
      }
      .proceso-header {
        padding: 10px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid #f0f0ee;
        background: #fafaf9;
      }
      .proceso-nombre {
        font-size: 13px;
        font-weight: 500;
      }
      .centro-btn {
        padding: 5px 14px;
        border: 1px solid #ddd;
        border-radius: 99px;
        background: #fff;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        color: #888;
        transition: all 0.15s;
      }
      .centro-btn:hover {
        background: #f1efea;
      }
      .centro-btn.active {
        background: #1c1c1a;
        color: #fff;
        border-color: #1c1c1a;
      }

      /* ── NUEVO: barra de filtro de procesos ── */
      .filter-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .filter-bar input[type="text"] {
        padding: 7px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 13px;
        width: 240px;
        background: #fff;
      }
      .filter-bar input[type="text"]:focus {
        outline: none;
        border-color: #888;
      }
      .filter-bar select {
        padding: 7px 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 13px;
        background: #fff;
        cursor: pointer;
      }
      .filter-bar select:focus {
        outline: none;
        border-color: #888;
      }
      .filter-results {
        font-size: 12px;
        color: #888;
        margin-left: 4px;
      }

      /* ── NUEVO: botón copiar evento ── */
      .btn-copy {
        padding: 3px 8px;
        border: 1px solid #ddd;
        border-radius: 6px;
        background: #fff;
        font-size: 11px;
        cursor: pointer;
        color: #666;
        transition: all 0.15s;
        white-space: nowrap;
        font-family: inherit;
      }
      .btn-copy:hover {
        background: #f1efea;
        border-color: #aaa;
      }
      .btn-copy.copied {
        background: #eaf3de;
        border-color: #b5d98a;
        color: #27500a;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <h1>Validador de flujos de producción</h1>
      <div style="display: flex; gap: 6px; margin-left: auto">
        <button
          class="centro-btn active"
          onclick="seleccionarCentro('0200', this)"
        >
          0200
        </button>
        <button class="centro-btn" onclick="seleccionarCentro('0202', this)">
          0202
        </button>
        <button class="centro-btn" onclick="seleccionarCentro('0400', this)">
          0400
        </button>
      </div>
    </div>

    <div class="main">
      <div class="config-box">
        <div>
          <label>Centro activo</label>
          <input
            type="text"
            id="centroActivo"
            value="0200"
            readonly
            style="
              width: 80px;
              background: #f5f5f4;
              color: #888;
              text-align: center;
              font-weight: 500;
            "
          />
        </div>
        <div>
          <label>Fecha a validar</label>
          <input type="date" id="fechaFiltro" />
        </div>
        <div>
          <label>&nbsp;</label>
          <button class="btn btn-primary" onclick="cargarSheet()">
            Cargar y analizar
          </button>
        </div>
        <div>
          <label>&nbsp;</label>
          <button class="btn" onclick="switchTab('asistencia')">
            Asistencia
          </button>
        </div>
      </div>

      <div class="cards">
        <div class="card">
          <div class="card-label">Registros del dia</div>
          <div class="card-val neutral" id="cTotal">-</div>
        </div>
        <div class="card">
          <div class="card-label">Procesos OK</div>
          <div class="card-val ok" id="cProcOk">-</div>
        </div>
        <div class="card">
          <div class="card-label">Procesos con error</div>
          <div class="card-val err" id="cProcErr">-</div>
        </div>
        <div class="card">
          <div class="card-label">Tiempo muerto</div>
          <div class="card-val warn" id="cDead">-</div>
        </div>
        <div class="card">
          <div class="card-label">A eliminar</div>
          <div class="card-val err" id="cElim">-</div>
        </div>
      </div>

      <div class="status-bar" id="statusBar">
        Selecciona una fecha y presiona "Cargar y analizar"
      </div>

      <div class="tabs">
        <button
          class="tab active"
          id="tab-errores"
          onclick="switchTab('errores')"
        >
          Solo errores
        </button>
        <button class="tab" id="tab-procesos" onclick="switchTab('procesos')">
          Por proceso
        </button>
        <button class="tab" id="tab-eliminar" onclick="switchTab('eliminar')">
          A eliminar
        </button>
        <button
          class="tab"
          id="tab-asistencia"
          onclick="switchTab('asistencia')"
        >
          Asistencia
        </button>
        <button class="tab" id="tab-actividad" onclick="switchTab('actividad')">
          Actividad procesos
        </button>
      </div>

      <div id="vistaErrores"></div>
      <div id="vistaProcesos" style="display: none"></div>
      <div id="vistaEliminar" style="display: none"></div>
      <div id="vistaAsistencia" style="display: none"></div>
      <div id="vistaActividad" style="display: none"></div>

      <div class="actions" style="margin-top: 8px">
        <button class="btn" onclick="descargarLimpios()">
          Datos limpios (.xlsx)
        </button>
        <button class="btn" onclick="descargarErrores()">
          Hoja de errores (.xlsx)
        </button>
        <button class="btn" onclick="descargarTiempoMuerto()">
          Tiempo muerto (.xlsx)
        </button>
      </div>
    </div>

    <script>
      // ─────────────────────────────────────────────
      //  CONSTANTES Y CONFIGURACIÓN
      // ─────────────────────────────────────────────
      const PAROS_TIPOS = [
        "MTTO",
        "CALIDAD",
        "MATERIALES",
        "INGENIERIA",
        "PAROS",
      ];

      const CENTROS = {
        "0200": {
          sheetUrl:
            "https://docs.google.com/spreadsheets/d/e/2PACX-1vTw2LUlfNDKaPI7jPCGQFehIR4J0B2JGJaeyWGoo3AlXQMcaj8XLESGgBVAdl8s9wDC5uG0j591AxhJ/pub?output=csv",
          // FIX D: eliminado "LIMPIEZA" duplicado (estaba al inicio y al final)
          // FIX B: corregido "FIRBAARMADO" → eliminado (era typo de FIBRAARMADO que ya existe)
          procesos: [
            "PUNTEADORA",
            "PUERTASCARROCERIA",
            "PUERTASCAMARA",
            "PLATAFORMAS2",
            "PLATAFORMAS1",
            "PINTURA2",
            "PANELES",
            "OMS",
            "LIMPIEZA",
            "HENNECKE",
            "ARGON4",
            "ARGON3",
            "ARGON2",
            "ARGON1",
            "ARANAS2",
            "ARANAS1",
            "TORNO2",
            "DISCO",
            "PAILERIA2",
            "PUNZONADORA",
            "CARPINTERIA",
            "PAILERIA5",
            "PAILERIA4",
            "CINTA",
            "PAILERIA1",
            "PB1032",
            "DURMA",
            "PAILERIA3",
            "TORNO1",
            "MOLDURAS",
            "FORRO",
            "LAMINADO",
            "LAMINA",
            "LASER",
            "PINTURA1",
            "ARMADO",
            "SELLADOPISO",
            "ELECTRICOSMONTAJE",
            "MONTAJE",
            "ELECTRICOSPISO",
            "CIERREPUNTOS",
            "ACCESORIOSTAPANCO",
            "RAMPAS",
            "SOLDADURAPISO",
            "COLDIDER",
            "FIBRA",
          ],
          areasPersonal: [
            "HABILITADO",
            "SUB_ENSAMBLE",
            "SUBENSAMBLE",
            "TERMINADO",
          ],
        },
        "0202": {
          sheetUrl: "COLOCA_AQUI_URL_0202", // pendiente de configurar
          procesos: [],
          areasPersonal: null,
        },
        "0400": {
          sheetUrl:
            "https://docs.google.com/spreadsheets/d/e/2PACX-1vSjt9N431H3C64OFNgLEwmc7s59jrPSDv5KAmws8XegmkKVkAdPAJDsANiOsxylZzuZU6WkgOVmDfOT/pub?output=csv",
          procesos: [
            "PAILERIA1",
            "GUILLOTINALAMINA",
            "GUILLOTINAMANUAL",
            "CNC",
            "ROUTER1",
            "REFACCION3",
            "ROUTERMANUAL1",
            "ROUTERMANUAL2",
            "DETALLADOPUERTAS",
            "PUERTASARMADO",
            "PAILERIA2",
            "PAILERIA3",
            "PAILERIA4",
            "PAILERIA5",
            "CORTADORAPAILERIA1",
            "REFACCION2",
            "DOBLADORA",
            "REFACCION1",
            "PRENSA",
            "EMPAQUE",
            "PERFILADORA",
            "RALLADORA",
            "NICROMO",
            "ESCUADRADORA",
            "SUBENSAMBLE",
            "EASYCOVER",
          ],
          areasPersonal: null,
        },
      };

      // ─────────────────────────────────────────────
      //  ESTADO GLOBAL
      // ─────────────────────────────────────────────
      let centroActual = "0200";
      let PROCESOS_VALIDOS = CENTROS["0200"].procesos;
      let todosLosDatos = [];
      let datosDia = [];
      let resultados = [];
      let porProceso = {};
      let personalSheet = [];

      // ─────────────────────────────────────────────
      //  INICIALIZACIÓN: poner fecha de ayer
      // ─────────────────────────────────────────────
      (function () {
        const ayer = new Date();
        ayer.setDate(ayer.getDate() - 1);
        document.getElementById("fechaFiltro").value = ayer
          .toISOString()
          .split("T")[0];
      })();

      // ─────────────────────────────────────────────
      //  UTILIDAD: escapar HTML para evitar XSS
      // ─────────────────────────────────────────────
      function esc(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // ─────────────────────────────────────────────
      //  SELECCIÓN DE CENTRO
      // ─────────────────────────────────────────────
      function seleccionarCentro(centro, btn) {
        centroActual = centro;
        PROCESOS_VALIDOS = CENTROS[centro].procesos;
        document.getElementById("centroActivo").value = centro;
        document
          .querySelectorAll(".centro-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        todosLosDatos = [];
        datosDia = [];
        resultados = [];
        porProceso = {};
        [
          "vistaErrores",
          "vistaProcesos",
          "vistaEliminar",
          "vistaAsistencia",
          "vistaActividad",
        ].forEach((id) => {
          document.getElementById(id).innerHTML = "";
        });
        setStatus(
          "Centro " + centro + " seleccionado — carga los datos",
          false,
        );
      }

      // ─────────────────────────────────────────────
      //  CAMBIO DE PESTAÑA
      // ─────────────────────────────────────────────
      function switchTab(tab) {
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        const el = document.getElementById("tab-" + tab);
        if (el) el.classList.add("active");
        const vistas = [
          "errores",
          "procesos",
          "eliminar",
          "asistencia",
          "actividad",
        ];
        vistas.forEach((v) => {
          document.getElementById(
            "vista" + v.charAt(0).toUpperCase() + v.slice(1),
          ).style.display = v === tab ? "" : "none";
        });
        if (tab === "asistencia") renderAsistencia();
        if (tab === "actividad") renderActividad();
      }

      // ─────────────────────────────────────────────
      //  LÓGICA DE CLASIFICACIÓN Y VALIDACIÓN
      // ─────────────────────────────────────────────
      function extraerProceso(evento) {
        const up = evento.toUpperCase();
        // Ordenar de más largo a más corto para que "CORTADORAPAILERIA1"
        // se evalúe antes que "PAILERIA1" y no haya falsos matches
        const ordenados = [...PROCESOS_VALIDOS].sort(
          (a, b) => b.length - a.length,
        );
        for (const p of ordenados) {
          if (up.endsWith(p)) return p;
        }
        return null;
      }

      function clasificar(evento) {
        if (/AP[\s_]ERROR/.test(evento)) return "AP_ERROR";
        if (/SIN_DEMANDA/.test(evento)) return "SIN_DEMANDA";
        if (/SIN_OPERADOR/.test(evento)) return "SIN_OPERADOR";
        if (/^TERMINO_OPERACIONES/.test(evento) || /_TERMINO_/.test(evento))
          return "TERMINO";
        if (/_OPERACIONES_/.test(evento)) return "OPERACIONES";
        for (const tipo of PAROS_TIPOS) {
          if (new RegExp("_" + tipo + "_").test(evento)) return "PARO";
        }
        if (/^\d{6}_/.test(evento)) return "PERSONAL";
        return "DESCONOCIDO";
      }

      function validarDigitos(evento) {
        const parteOrden = evento.split("_")[0];
        if (!parteOrden) return true;
        if (/^\d{6}$/.test(parteOrden)) return true;
        const segmentos = parteOrden.split(/[AB]/);
        for (const seg of segmentos) {
          if (/^\d+$/.test(seg) && seg.length !== 8) return false;
        }
        return true;
      }

      // Duplicados: solo aplica a eventos PERSONAL.
      // OPERACIONES, PARO y TERMINO pueden repetirse válidamente en el día
      // (un proceso puede arrancar → parar → arrancar → terminar con la misma orden).
      const TIPOS_NO_DUPLICABLES = new Set([
        "OPERACIONES",
        "PARO",
        "TERMINO",
        "SIN_DEMANDA",
        "SIN_OPERADOR",
      ]);

      function marcarDuplicados(datos) {
        const seen = new Set();
        return datos.map((d) => {
          const tipo = clasificar(d.evento);
          // Si el tipo no es duplicable, nunca lo marcamos como duplicado
          if (TIPOS_NO_DUPLICABLES.has(tipo)) {
            return { ...d, duplicado: false };
          }
          const key = d.evento.trim().toUpperCase();
          const dup = seen.has(key);
          seen.add(key);
          return { ...d, duplicado: dup };
        });
      }

      function parseFecha(str) {
        if (!str) return new Date(0);
        const partes = str.trim().split(" ");
        const fecha = partes[0] || "";
        const hora = partes[1] || "00:00:00";
        const hms = hora.split(":");
        const h = (hms[0] || "0").padStart(2, "0");
        const m = hms[1] || "00";
        const s = hms[2] || "00";
        const d = new Date(fecha + "T" + h + ":" + m + ":" + s);
        return isNaN(d) ? new Date(0) : d;
      }

      function validarFlujo(registros) {
        const flujo = registros.filter(
          (r) =>
            r.tipo === "OPERACIONES" ||
            r.tipo === "PARO" ||
            r.tipo === "TERMINO",
        );
        if (!flujo.length)
          return { valido: true, motivo: "Sin actividad operativa" };

        const ciclos = [];
        let cicloActual = [];
        for (const reg of flujo) {
          cicloActual.push(reg);
          if (reg.tipo === "TERMINO") {
            ciclos.push(cicloActual);
            cicloActual = [];
          }
        }
        const sinCerrar = cicloActual;

        for (const ciclo of ciclos) {
          const seq = ciclo.map((r) => r.tipo);
          const antes = seq.slice(0, -1);
          if (!antes.includes("OPERACIONES")) {
            return {
              valido: false,
              motivo: "Hay un TERMINO sin OPERACIONES previa",
            };
          }
          let hayOpDespuesParo = true;
          for (let j = antes.length - 1; j >= 0; j--) {
            if (antes[j] === "OPERACIONES") break;
            if (antes[j] === "PARO") {
              hayOpDespuesParo = false;
              break;
            }
          }
          if (!hayOpDespuesParo) {
            return {
              valido: false,
              motivo: "Hay un PARO sin retorno a OPERACIONES antes del TERMINO",
            };
          }
        }

        if (sinCerrar.length > 0) {
          const tipos = sinCerrar.map((r) => r.tipo);
          const ultimo = tipos[tipos.length - 1];
          if (ultimo === "PARO") {
            return {
              valido: false,
              tiempoMuerto: true,
              motivo:
                "Paro sin retorno a operaciones ni termino — agregar OPERACIONES y TERMINO a las 23:00",
            };
          }
          if (tipos.includes("OPERACIONES")) {
            return {
              valido: false,
              motivo:
                "Hay OPERACIONES sin TERMINO al final del día — el último ciclo no se cerró",
            };
          }
        }
        return { valido: true, motivo: "Flujo correcto" };
      }

      // ─────────────────────────────────────────────
      //  CARGA DEL SHEET
      // ─────────────────────────────────────────────
      async function cargarSheet() {
        // FIX G: validar que la URL esté configurada antes de hacer fetch
        const url = CENTROS[centroActual].sheetUrl;
        if (!url || url.startsWith("COLOCA")) {
          setStatus(
            "El centro " + centroActual + " no tiene URL configurada aún",
            false,
          );
          return;
        }
        setStatus("Cargando datos del Google Sheet...", true);
        try {
          const res = await fetch(url);
          const text = await res.text();
          const filas = text.trim().split("\n").slice(1);
          todosLosDatos = filas
            .map((f) => {
              let fecha = "",
                evento = "";
              if (f.charAt(0) === '"') {
                const m = f.match(/^"([^"]+)","?(.+?)"?$/);
                if (m) {
                  fecha = m[1].trim();
                  evento = m[2].trim();
                }
              } else {
                const idx = f.indexOf(",");
                if (idx > 0) {
                  fecha = f.substring(0, idx).trim();
                  evento = f
                    .substring(idx + 1)
                    .trim()
                    .replace(/^"|"$/g, "");
                }
              }
              return fecha && evento ? { fecha, evento } : null;
            })
            .filter(Boolean);

          const fechaSel = document.getElementById("fechaFiltro").value;
          analizar(fechaSel);
        } catch (e) {
          setStatus("Error al cargar Sheet: " + e.message, false);
        }
      }

      // ─────────────────────────────────────────────
      //  ANÁLISIS PRINCIPAL
      // ─────────────────────────────────────────────
      function analizar(fechaSel) {
        if (!fechaSel) {
          setStatus("Selecciona una fecha", false);
          return;
        }

        const brutos = todosLosDatos
          .filter((d) => d.fecha.trim().split(" ")[0] === fechaSel)
          .sort((a, b) => parseFecha(a.fecha) - parseFecha(b.fecha));

        if (!brutos.length) {
          setStatus("No hay registros para el " + fechaSel, false);
          return;
        }

        // FIX C: marcar duplicados con Set en O(n)
        datosDia = marcarDuplicados(brutos);

        resultados = datosDia.map((d) => {
          const tipo = clasificar(d.evento);
          const proc = extraerProceso(d.evento);
          let estado = "ok",
            nota = "",
            accion = "";

          if (d.duplicado) {
            estado = "err";
            nota = "Duplicado";
            accion = "Eliminar";
          } else if (tipo === "AP_ERROR") {
            estado = "err";
            nota = "AP ERROR";
            accion = "Eliminar";
          } else if (!validarDigitos(d.evento)) {
            estado = "warn";
            nota = "Dígitos incorrectos en orden de producción";
            accion = "Revisar y corregir";
            // FIX I: avisar eventos DESCONOCIDOS en vez de dejarlos pasar como ok
          } else if (tipo === "DESCONOCIDO") {
            estado = "warn";
            nota = "Tipo de evento no reconocido";
            accion = "Revisar";
          }
          return {
            fecha: d.fecha,
            evento: d.evento,
            tipo,
            proceso: proc,
            estado,
            nota,
            accion,
          };
        });

        porProceso = {};
        for (const r of resultados) {
          if (!r.proceso) continue;
          if (!porProceso[r.proceso]) porProceso[r.proceso] = [];
          porProceso[r.proceso].push(r);
        }

        for (const proc of Object.keys(porProceso)) {
          porProceso[proc].sort(
            (a, b) => parseFecha(a.fecha) - parseFecha(b.fecha),
          );
          const regsValidos = porProceso[proc].filter((r) => r.estado === "ok");
          const resultado = validarFlujo(regsValidos);
          if (!resultado.valido) {
            for (const reg of porProceso[proc]) {
              if (
                reg.estado === "ok" &&
                (reg.tipo === "OPERACIONES" ||
                  reg.tipo === "PARO" ||
                  reg.tipo === "TERMINO" ||
                  reg.tipo === "PERSONAL")
              ) {
                if (resultado.tiempoMuerto) {
                  reg.estado = "dead";
                  reg.nota = "Tiempo muerto: " + resultado.motivo;
                  reg.accion = "Agregar OPERACIONES y TERMINO a las 23:00";
                } else {
                  reg.estado = "flujo";
                  reg.nota =
                    "Flujo inválido en " + proc + ": " + resultado.motivo;
                  reg.accion = "Mover personal a hoja de errores";
                }
              }
            }
          }
        }

        actualizarContadores();
        renderVistas();
        setStatus(
          "OK — " + datosDia.length + " registros analizados del " + fechaSel,
          false,
        );
      }

      // ─────────────────────────────────────────────
      //  CONTADORES
      // ─────────────────────────────────────────────
      function actualizarContadores() {
        let procOk = 0,
          procErr = 0,
          dead = 0,
          elim = 0;
        for (const regs of Object.values(porProceso)) {
          const tieneErr = regs.some(
            (r) => r.estado === "flujo" || r.estado === "dead",
          );
          const tieneDead = regs.some((r) => r.estado === "dead");
          if (tieneErr) procErr++;
          else procOk++;
          if (tieneDead) dead++;
        }
        for (const r of resultados) {
          if (r.estado === "err") elim++;
        }
        document.getElementById("cTotal").textContent = datosDia.length;
        document.getElementById("cProcOk").textContent = procOk;
        document.getElementById("cProcErr").textContent = procErr;
        document.getElementById("cDead").textContent = dead;
        document.getElementById("cElim").textContent = elim;
      }

      // ─────────────────────────────────────────────
      //  RENDERIZADO DE VISTAS
      // ─────────────────────────────────────────────
      function renderVistas() {
        renderErrores();
        renderProcesos();
        renderEliminar();
        renderActividad();
      }

      // ── Botón copiar evento ──────────────────────
      // Genera un botón que al clicar copia el texto al portapapeles
      function btnCopiar(texto) {
        const id = "cp_" + Math.random().toString(36).slice(2, 8);
        // Usamos setTimeout para adjuntar el listener después de que el DOM exista
        setTimeout(() => {
          const btn = document.getElementById(id);
          if (!btn) return;
          btn.addEventListener("click", () => {
            navigator.clipboard
              .writeText(texto)
              .then(() => {
                btn.textContent = "✓ Copiado";
                btn.classList.add("copied");
                setTimeout(() => {
                  btn.textContent = "Copiar";
                  btn.classList.remove("copied");
                }, 1500);
              })
              .catch(() => {
                // Fallback para navegadores sin clipboard API
                const ta = document.createElement("textarea");
                ta.value = texto;
                ta.style.position = "fixed";
                ta.style.opacity = "0";
                document.body.appendChild(ta);
                ta.select();
                document.execCommand("copy");
                document.body.removeChild(ta);
                btn.textContent = "✓ Copiado";
                btn.classList.add("copied");
                setTimeout(() => {
                  btn.textContent = "Copiar";
                  btn.classList.remove("copied");
                }, 1500);
              });
          });
        }, 0);
        return `<button id="${id}" class="btn-copy">Copiar</button>`;
      }

      // ── Tabla genérica ───────────────────────────
      function buildTable(filas, mostrarNota) {
        const badgeMap = {
          ok: ["badge-ok", "Válido"],
          err: ["badge-err", "Eliminar"],
          warn: ["badge-warn", "Revisar"],
          flujo: ["badge-err", "Flujo inválido"],
          dead: ["badge-dead", "Tiempo muerto"],
        };
        const rowMap = {
          err: "row-err",
          warn: "row-warn",
          flujo: "row-err",
          dead: "row-dead",
          ok: "",
        };

        let html =
          '<div class="table-wrap"><table><thead><tr>' +
          "<th>#</th><th>Hora</th><th>Evento</th><th>Copiar</th><th>Tipo</th><th>Estado</th>";
        if (mostrarNota) html += "<th>Nota</th>";
        html += "</tr></thead><tbody>";

        for (let i = 0; i < filas.length; i++) {
          const r = filas[i];
          const bm = badgeMap[r.estado] || ["badge-warn", "?"];
          const hora = r.fecha.length > 10 ? r.fecha.substring(11) : r.fecha;
          html += `<tr class="${rowMap[r.estado] || ""}">`;
          html += `<td style="color:#aaa;font-size:12px">${i + 1}</td>`;
          html += `<td class="fecha-cell">${esc(hora)}</td>`;
          html += `<td class="evento-cell">${esc(r.evento)}</td>`;
          html += `<td>${btnCopiar(r.evento)}</td>`;
          html += `<td style="font-size:12px;color:#666">${esc(r.tipo)}</td>`;
          html += `<td><span class="badge ${bm[0]}">${bm[1]}</span></td>`;
          if (mostrarNota)
            html += `<td class="nota-cell">${esc(r.nota || "")}</td>`;
          html += "</tr>";
        }
        html += "</tbody></table></div>";
        return html;
      }

      // ── Vista "Solo errores" ─────────────────────
      function renderErrores() {
        const cont = document.getElementById("vistaErrores");
        const errs = resultados.filter((r) => r.estado !== "ok");
        if (!errs.length) {
          cont.innerHTML =
            '<div class="table-wrap"><table><tbody>' +
            '<tr><td class="empty-state" colspan="7">Sin errores detectados</td></tr>' +
            "</tbody></table></div>";
        } else {
          cont.innerHTML = buildTable(errs, true);
        }
      }

      // ── Vista "Por proceso" con filtro ───────────
      function renderProcesos() {
        const cont = document.getElementById("vistaProcesos");
        const procs = Object.keys(porProceso);
        if (!procs.length) {
          cont.innerHTML =
            '<div class="table-wrap"><table><tbody>' +
            '<tr><td class="empty-state" colspan="7">Sin datos de procesos</td></tr>' +
            "</tbody></table></div>";
          return;
        }

        // Construir barra de filtros
        const opcionesEstado = `
          <option value="">Todos los estados</option>
          <option value="ok">Solo OK</option>
          <option value="err">Con errores</option>
        `;
        const opcionesProceso = procs
          .map((p) => `<option value="${esc(p)}">${esc(p)}</option>`)
          .join("");

        cont.innerHTML = `
          <div class="filter-bar">
            <input type="text" id="filtroProcesoTexto" placeholder="Buscar proceso…"
              oninput="filtrarProcesos()" />
            <select id="filtroProcesoEstado" onchange="filtrarProcesos()">
              ${opcionesEstado}
            </select>
            <select id="filtroProcesoNombre" onchange="filtrarProcesos()">
              <option value="">Todos los procesos</option>
              ${opcionesProceso}
            </select>
            <span class="filter-results" id="filtroResultados"></span>
          </div>
          <div id="listaProcesos"></div>
        `;
        filtrarProcesos(); // render inicial con todos
      }

      function filtrarProcesos() {
        const texto = (
          document.getElementById("filtroProcesoTexto")?.value || ""
        )
          .trim()
          .toUpperCase();
        const estado =
          document.getElementById("filtroProcesoEstado")?.value || "";
        const nombre =
          document.getElementById("filtroProcesoNombre")?.value || "";
        const lista = document.getElementById("listaProcesos");
        if (!lista) return;

        const procs = Object.keys(porProceso);
        let visibles = 0;
        let html = "";

        for (const proc of procs) {
          // Filtro por nombre exacto (select)
          if (nombre && proc !== nombre) continue;
          // Filtro por texto libre
          if (texto && !proc.toUpperCase().includes(texto)) continue;
          // Filtro por estado
          const regs = porProceso[proc];
          const tieneError = regs.some(
            (r) =>
              r.estado === "err" || r.estado === "flujo" || r.estado === "dead",
          );
          if (estado === "ok" && tieneError) continue;
          if (estado === "err" && !tieneError) continue;

          visibles++;
          const badge = tieneError
            ? '<span class="badge badge-err">Con errores</span>'
            : '<span class="badge badge-ok">OK</span>';

          html += `<div class="proceso-group">
            <div class="proceso-header">
              <span class="proceso-nombre">${esc(proc)}</span>${badge}
              <span style="font-size:11px;color:#aaa;margin-left:auto">${regs.length} registro(s)</span>
            </div>
            ${buildTable(regs, false)}
          </div>`;
        }

        if (!visibles) {
          html =
            '<div class="table-wrap"><table><tbody>' +
            '<tr><td class="empty-state" colspan="7">Ningún proceso coincide con el filtro</td></tr>' +
            "</tbody></table></div>";
        }

        lista.innerHTML = html;
        document.getElementById("filtroResultados").textContent =
          visibles + " de " + Object.keys(porProceso).length + " proceso(s)";
      }

      // ── Vista "A eliminar" ───────────────────────
      function renderEliminar() {
        const cont = document.getElementById("vistaEliminar");
        const elim = resultados.filter((r) => r.estado === "err");
        if (!elim.length) {
          cont.innerHTML =
            '<div class="table-wrap"><table><tbody>' +
            '<tr><td class="empty-state" colspan="7">Sin registros a eliminar</td></tr>' +
            "</tbody></table></div>";
        } else {
          cont.innerHTML = buildTable(elim, true);
        }
      }

      // ── Vista "Actividad procesos" ───────────────
      function renderActividad() {
        const cont = document.getElementById("vistaActividad");
        if (!resultados.length) {
          cont.innerHTML =
            '<div class="table-wrap"><table><tbody>' +
            '<tr><td class="empty-state" colspan="4">Carga los datos del día primero</td></tr>' +
            "</tbody></table></div>";
          return;
        }
        const procesos = CENTROS[centroActual].procesos;
        const personalPorProceso = {};
        for (const p of procesos) personalPorProceso[p] = 0;
        for (const r of resultados) {
          if (
            r.tipo === "PERSONAL" &&
            r.proceso &&
            personalPorProceso[r.proceso] !== undefined
          ) {
            personalPorProceso[r.proceso]++;
          }
        }
        const activos = procesos.filter((p) => personalPorProceso[p] > 0);
        const ausentes = procesos.filter((p) => personalPorProceso[p] === 0);

        let html = `
          <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
            <div class="card" style="flex:1;min-width:120px">
              <div class="card-label">Total procesos</div>
              <div class="card-val neutral">${procesos.length}</div>
            </div>
            <div class="card" style="flex:1;min-width:120px">
              <div class="card-label">Activos</div>
              <div class="card-val ok">${activos.length}</div>
            </div>
            <div class="card" style="flex:1;min-width:120px">
              <div class="card-label">Sin personal</div>
              <div class="card-val err">${ausentes.length}</div>
            </div>
          </div>
          <div class="table-wrap"><table>
            <thead><tr><th>#</th><th>Proceso</th><th>Personal registrado</th><th>Estado</th></tr></thead>
            <tbody>`;

        const todos = [
          ...activos.map((p) => ({
            proceso: p,
            count: personalPorProceso[p],
            estado: "activo",
          })),
          ...ausentes.map((p) => ({ proceso: p, count: 0, estado: "ausente" })),
        ];
        todos.forEach((item, t) => {
          const badge =
            item.estado === "activo"
              ? '<span class="badge badge-ok">Activo</span>'
              : '<span class="badge badge-err">Sin personal</span>';
          const rowCls = item.estado === "ausente" ? "row-err" : "";
          html += `<tr class="${rowCls}">
            <td style="color:#aaa;font-size:12px">${t + 1}</td>
            <td style="font-weight:500">${esc(item.proceso)}</td>
            <td style="font-size:12px;color:#666">${item.count > 0 ? item.count + " persona(s)" : "—"}</td>
            <td>${badge}</td>
          </tr>`;
        });
        html += "</tbody></table></div>";
        cont.innerHTML = html;
      }

      // ─────────────────────────────────────────────
      //  ASISTENCIA
      // ─────────────────────────────────────────────
      function renderAsistencia() {
        const cont = document.getElementById("vistaAsistencia");
        const checados = {};
        for (const r of resultados) {
          if (r.tipo === "PERSONAL") {
            const numEmp = r.evento.split("_")[0].trim().padStart(6, "0");
            if (/^\d{6}$/.test(numEmp)) checados[numEmp] = true;
          }
        }

        if (!personalSheet.length) {
          cont.innerHTML = `
            <div class="table-wrap" style="padding:24px;text-align:center">
              <p style="color:#888;font-size:13px;margin-bottom:16px">Carga tu lista de personal para ver la asistencia</p>
              <label class="btn btn-primary" style="cursor:pointer">Cargar Excel de personal
                <input type="file" accept=".xlsx,.xls,.csv" onchange="cargarExcelPersonal(event)" style="display:none"/>
              </label>
              <p style="color:#aaa;font-size:12px;margin-top:12px">
                El Excel debe tener columnas <strong>EMPLEADO</strong> y <strong>NOMBRE</strong> (cualquier posición)
              </p>
            </div>`;
          return;
        }
        if (!resultados.length) {
          cont.innerHTML =
            '<div class="table-wrap"><table><tbody>' +
            '<tr><td class="empty-state" colspan="4">Carga los datos del día primero</td></tr>' +
            "</tbody></table></div>";
          return;
        }

        const presentes = [],
          ausentes = [],
          noEnLista = [];
        const empleadosEnSheet = {};
        for (const emp of personalSheet) {
          empleadosEnSheet[emp.empleado] = true;
          if (checados[emp.empleado]) presentes.push(emp);
          else ausentes.push(emp);
        }
        for (const clave of Object.keys(checados)) {
          if (!empleadosEnSheet[clave])
            noEnLista.push({ empleado: clave, nombre: clave });
        }

        let html = `
          <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
            <div class="card" style="flex:1;min-width:120px">
              <div class="card-label">Total personal</div>
              <div class="card-val neutral">${personalSheet.length}</div>
            </div>
            <div class="card" style="flex:1;min-width:120px">
              <div class="card-label">Presentes</div>
              <div class="card-val ok">${presentes.length}</div>
            </div>
            <div class="card" style="flex:1;min-width:120px">
              <div class="card-label">Ausentes</div>
              <div class="card-val err">${ausentes.length}</div>
            </div>
            <div class="card" style="flex:1;min-width:120px">
              <div class="card-label">No en lista</div>
              <div class="card-val warn">${noEnLista.length}</div>
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-bottom:12px">
            <label class="btn" style="cursor:pointer;font-size:12px">Cambiar Excel
              <input type="file" accept=".xlsx,.xls,.csv" onchange="cargarExcelPersonal(event)" style="display:none"/>
            </label>
            <button class="btn" style="font-size:12px" onclick="descargarAsistencia()">Descargar asistencia (.xlsx)</button>
          </div>
          <div class="table-wrap"><table>
            <thead><tr><th>#</th><th>Empleado</th><th>Nombre</th><th>Estado</th></tr></thead>
            <tbody>`;

        const todos = [
          ...ausentes.map((e) => ({ ...e, estado: "ausente" })),
          ...presentes.map((e) => ({ ...e, estado: "presente" })),
          ...noEnLista.map((e) => ({ ...e, estado: "extra" })),
        ];
        todos.forEach((p, t) => {
          const badge =
            p.estado === "presente"
              ? '<span class="badge badge-ok">Presente</span>'
              : p.estado === "ausente"
                ? '<span class="badge badge-err">Ausente</span>'
                : '<span class="badge badge-warn">No en lista</span>';
          const rowCls =
            p.estado === "ausente"
              ? "row-err"
              : p.estado === "extra"
                ? "row-warn"
                : "";
          html += `<tr class="${rowCls}">
            <td style="color:#aaa;font-size:12px">${t + 1}</td>
            <td style="font-size:12px;font-family:monospace">${esc(p.empleado)}</td>
            <td>${esc(p.nombre)}</td>
            <td>${badge}</td>
          </tr>`;
        });
        html += "</tbody></table></div>";
        cont.innerHTML = html;
      }

      function cargarExcelPersonal(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function (e) {
          const wb = XLSX.read(e.target.result, { type: "binary" });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const datos = XLSX.utils.sheet_to_json(ws, { header: 1 });
          personalSheet = [];
          if (datos.length < 2) {
            setStatus("El Excel está vacío o no tiene datos", false);
            return;
          }
          const encabezado = datos[0].map((c) =>
            (c || "").toString().trim().toUpperCase(),
          );
          const colEmpleado = encabezado.indexOf("EMPLEADO");
          const colNombre = encabezado.indexOf("NOMBRE");
          if (colEmpleado === -1) {
            setStatus("No se encontró la columna EMPLEADO en el Excel", false);
            return;
          }
          for (let i = 1; i < datos.length; i++) {
            const fila = datos[i];
            if (!fila || fila.length === 0) continue;
            let empRaw =
              fila[colEmpleado] !== undefined && fila[colEmpleado] !== null
                ? fila[colEmpleado].toString().trim()
                : "";
            if (/^\d{1,6}$/.test(empRaw)) empRaw = empRaw.padStart(6, "0");
            const nombre =
              colNombre !== -1
                ? (fila[colNombre] || "").toString().trim().toUpperCase()
                : empRaw;
            if (/^\d{6}$/.test(empRaw) && nombre) {
              personalSheet.push({ empleado: empRaw, nombre });
            }
          }
          renderAsistencia();
          setStatus(
            "OK — " + personalSheet.length + " empleados cargados",
            false,
          );
        };
        reader.readAsBinaryString(file);
      }

      // ─────────────────────────────────────────────
      //  DESCARGAS XLSX
      // ─────────────────────────────────────────────
      function descargarAsistencia() {
        if (!personalSheet.length) return;
        const checados = {};
        for (const r of resultados) {
          if (r.tipo === "PERSONAL") {
            const numEmp = r.evento.split("_")[0].trim().padStart(6, "0");
            if (/^\d{6}$/.test(numEmp)) checados[numEmp] = true;
          }
        }
        const filas = personalSheet.map((emp) => ({
          Empleado: emp.empleado,
          Nombre: emp.nombre,
          Estado: checados[emp.empleado] ? "Presente" : "Ausente",
          Fecha: document.getElementById("fechaFiltro").value,
          Centro: centroActual,
        }));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(
          wb,
          XLSX.utils.json_to_sheet(filas),
          "Asistencia",
        );
        const f = document
          .getElementById("fechaFiltro")
          .value.replace(/-/g, "");
        XLSX.writeFile(wb, "asistencia_" + centroActual + "_" + f + ".xlsx");
      }

      function descargarLimpios() {
        if (!resultados.length) {
          alert("Carga los datos primero");
          return;
        }
        const filas = resultados
          .filter((r) => r.estado !== "err")
          .map((r) => ({
            Fecha: r.fecha,
            Evento: r.evento,
            Tipo: r.tipo,
            Proceso: r.proceso || "",
            Estado: r.estado === "ok" ? "Válido" : r.nota,
          }));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(
          wb,
          XLSX.utils.json_to_sheet(filas),
          "Datos Limpios",
        );
        const f = document
          .getElementById("fechaFiltro")
          .value.replace(/-/g, "");
        XLSX.writeFile(
          wb,
          "flujos_limpios_" + centroActual + "_" + f + ".xlsx",
        );
      }

      function descargarErrores() {
        if (!resultados.length) {
          alert("Carga los datos primero");
          return;
        }
        const filas = resultados
          .filter(
            (r) =>
              r.estado === "err" || r.estado === "warn" || r.estado === "flujo",
          )
          .map((r) => ({
            Fecha: r.fecha,
            Evento: r.evento,
            Tipo: r.tipo,
            Proceso: r.proceso || "",
            Error: r.nota,
            Accion: r.accion,
          }));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(
          wb,
          XLSX.utils.json_to_sheet(filas),
          "Errores",
        );
        const f = document
          .getElementById("fechaFiltro")
          .value.replace(/-/g, "");
        XLSX.writeFile(wb, "errores_" + centroActual + "_" + f + ".xlsx");
      }

      function descargarTiempoMuerto() {
        if (!resultados.length) {
          alert("Carga los datos primero");
          return;
        }
        const filas = resultados
          .filter((r) => r.estado === "dead")
          .map((r) => ({
            Fecha: r.fecha,
            Evento: r.evento,
            Proceso: r.proceso || "",
            Nota: r.nota,
          }));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(
          wb,
          XLSX.utils.json_to_sheet(filas),
          "Tiempo Muerto",
        );
        const f = document
          .getElementById("fechaFiltro")
          .value.replace(/-/g, "");
        XLSX.writeFile(wb, "tiempo_muerto_" + centroActual + "_" + f + ".xlsx");
      }

      // ─────────────────────────────────────────────
      //  STATUS BAR
      // ─────────────────────────────────────────────
      function setStatus(msg, cargando) {
        const bar = document.getElementById("statusBar");
        bar.innerHTML = cargando
          ? '<div class="spinner"></div> ' + esc(msg)
          : esc(msg);
      }
    </script>
  </body>
</html>
