<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Validador de Flujos de Producción</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg-page: #f5f5f4;
        --bg-surface: #fff;
        --bg-surface-alt: #fafaf9;
        --text-main: #1c1c1a;
        --text-muted: #888;
        --text-faint: #aaa;
        --border: #e5e5e3;
        --border-strong: #ddd;
        --row-err: #fff8f8;
        --row-warn: #fffbf4;
        --row-dead: #f5f5f4;
        --hover-bg: #f1efea;
        --ok-text: #3b6d11;
        --err-text: #a32d2d;
        --warn-text: #854f0b;
        --badge-err-bg: #fcebeb;
        --badge-err-text: #791f1f;
        --badge-warn-bg: #faeeda;
        --badge-warn-text: #633806;
        --badge-dead-bg: #d3d1c7;
        --badge-dead-text: #444441;
        --badge-ok-bg: #eaf3de;
        --badge-ok-text: #27500a;
        --btn-primary-bg: #1c1c1a;
        --btn-primary-text: #fff;
        --btn-primary-hover: #333;
        --spinner-track: #ddd;
      }
      [data-theme="dark"] {
        --bg-page: #15151a;
        --bg-surface: #1e1e24;
        --bg-surface-alt: #24242b;
        --text-main: #e8e8ea;
        --text-muted: #9a9aa3;
        --text-faint: #6b6b75;
        --border: #32323c;
        --border-strong: #3c3c47;
        --row-err: #2a1c1c;
        --row-warn: #2a2418;
        --row-dead: #232328;
        --hover-bg: #2a2a33;
        --ok-text: #7fcf4d;
        --err-text: #f0746e;
        --warn-text: #e0a93f;
        --badge-err-bg: #3a2222;
        --badge-err-text: #f0a8a4;
        --badge-warn-bg: #3a3018;
        --badge-warn-text: #f0c878;
        --badge-dead-bg: #3a3a42;
        --badge-dead-text: #c4c4cc;
        --badge-ok-bg: #1f3318;
        --badge-ok-text: #9fe070;
        --btn-primary-bg: #e8e8ea;
        --btn-primary-text: #15151a;
        --btn-primary-hover: #fff;
        --spinner-track: #3c3c47;
      }
      body {
        font-family: system-ui, sans-serif;
        background: var(--bg-page);
        color: var(--text-main);
        font-size: 14px;
        transition: background 0.2s, color 0.2s;
      }
      .topbar {
        background: var(--bg-surface);
        border-bottom: 1px solid var(--border);
        padding: 14px 24px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .topbar h1 {
        font-size: 16px;
        font-weight: 500;
      }
      .main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 16px;
      }
      .config-box {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 16px 20px;
        margin-bottom: 20px;
        display: grid;
        grid-template-columns: auto 1fr auto auto;
        gap: 8px;
        align-items: end;
      }
      .config-box label {
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        display: block;
        margin-bottom: 4px;
      }
      .config-box input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        font-size: 13px;
        background: var(--bg-surface);
        color: var(--text-main);
      }
      .config-box input:focus {
        outline: none;
        border-color: var(--text-muted);
      }
      .btn {
        padding: 8px 18px;
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        background: var(--bg-surface);
        color: var(--text-main);
        font-size: 13px;
        cursor: pointer;
        transition: background 0.15s;
        white-space: nowrap;
      }
      .btn:hover {
        background: var(--hover-bg);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-primary {
        background: var(--btn-primary-bg);
        color: var(--btn-primary-text);
        border-color: var(--btn-primary-bg);
      }
      .btn-primary:hover {
        background: var(--btn-primary-hover);
      }
      .btn-theme {
        width: 36px;
        height: 36px;
        padding: 0;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 10px;
        margin-bottom: 20px;
      }
      .card {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px 16px;
      }
      .card-label {
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 6px;
      }
      .card-val {
        font-size: 26px;
        font-weight: 500;
      }
      .card-val.ok {
        color: var(--ok-text);
      }
      .card-val.err {
        color: var(--err-text);
      }
      .card-val.warn {
        color: var(--warn-text);
      }
      .card-val.neutral {
        color: var(--text-main);
      }
      .status-bar {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 14px;
        margin-bottom: 16px;
        font-size: 13px;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 40px;
      }
      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid var(--spinner-track);
        border-top-color: var(--text-muted);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        flex-shrink: 0;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .tab {
        padding: 6px 16px;
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        background: var(--bg-surface);
        font-size: 12px;
        cursor: pointer;
        color: var(--text-muted);
      }
      .tab.active {
        background: var(--btn-primary-bg);
        color: var(--btn-primary-text);
        border-color: var(--btn-primary-bg);
      }
      .table-wrap {
        overflow-x: auto;
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-bottom: 20px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      th {
        text-align: left;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        color: var(--text-muted);
        font-weight: 500;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        white-space: nowrap;
      }
      td {
        padding: 9px 12px;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr.row-err {
        background: var(--row-err);
      }
      tr.row-warn {
        background: var(--row-warn);
      }
      tr.row-dead {
        background: var(--row-dead);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        font-size: 11px;
        font-weight: 500;
        padding: 2px 8px;
        border-radius: 99px;
        white-space: nowrap;
      }
      .badge-err {
        background: var(--badge-err-bg);
        color: var(--badge-err-text);
      }
      .badge-warn {
        background: var(--badge-warn-bg);
        color: var(--badge-warn-text);
      }
      .badge-dead {
        background: var(--badge-dead-bg);
        color: var(--badge-dead-text);
      }
      .badge-ok {
        background: var(--badge-ok-bg);
        color: var(--badge-ok-text);
      }
      .evento-cell {
        word-break: break-all;
        font-size: 12px;
        font-family: monospace;
        max-width: 380px;
      }
      .nota-cell {
        font-size: 12px;
        color: var(--text-muted);
        max-width: 260px;
      }
      .fecha-cell {
        white-space: nowrap;
        font-size: 12px;
        color: var(--text-muted);
      }
      .empty-state {
        text-align: center;
        padding: 40px;
        color: var(--text-faint);
        font-size: 13px;
      }
      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .proceso-group {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-bottom: 16px;
        overflow: hidden;
      }
      .proceso-header {
        padding: 10px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-surface-alt);
      }
      .proceso-nombre {
        font-size: 13px;
        font-weight: 500;
      }
      .centro-btn {
        padding: 5px 14px;
        border: 1px solid var(--border-strong);
        border-radius: 99px;
        background: var(--bg-surface);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        color: var(--text-muted);
        transition: all 0.15s;
      }
      .centro-btn:hover {
        background: var(--hover-bg);
      }
      .centro-btn.active {
        background: var(--btn-primary-bg);
        color: var(--btn-primary-text);
        border-color: var(--btn-primary-bg);
      }

      /* ── NUEVO: barra de filtro de procesos ── */
      .filter-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .filter-bar input[type="text"] {
        padding: 7px 12px;
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        font-size: 13px;
        width: 240px;
        background: var(--bg-surface);
        color: var(--text-main);
      }
      .filter-bar input[type="text"]:focus {
        outline: none;
        border-color: var(--text-muted);
      }
      .filter-bar select {
        padding: 7px 10px;
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        font-size: 13px;
        background: var(--bg-surface);
        color: var(--text-main);
        cursor: pointer;
      }
      .filter-bar select:focus {
        outline: none;
        border-color: var(--text-muted);
      }
      .filter-results {
        font-size: 12px;
        color: var(--text-muted);
        margin-left: 4px;
      }

      /* ── NUEVO: botón copiar evento ── */
      .btn-copy {
        padding: 3px 8px;
        border: 1px solid var(--border-strong);
        border-radius: 6px;
        background: var(--bg-surface);
        font-size: 11px;
        cursor: pointer;
        color: var(--text-muted);
        transition: all 0.15s;
        white-space: nowrap;
        font-family: inherit;
      }
      .btn-copy:hover {
        background: var(--hover-bg);
        border-color: var(--text-faint);
      }
      .btn-copy.copied {
        background: var(--badge-ok-bg);
        border-color: var(--ok-text);
        color: var(--badge-ok-text);
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <h1>Validador de flujos de producción</h1>
      <div style="display: flex; gap: 6px; margin-left: auto; align-items: center">
        <button
          class="btn btn-theme"
          id="btnTema"
          onclick="alternarTema()"
          title="Cambiar tema claro/oscuro"
        >
          🌙
        </button>
        <div style="width: 1px; height: 24px; background: var(--border); margin: 0 4px"></div>
        <button
          class="centro-btn active"
          onclick="seleccionarCentro('0200', this)"
        >
          0200
        </button>
        <button class="centro-btn" onclick="seleccionarCentro('0202', this)">
          0202
        </button>
        <button class="centro-btn" onclick="seleccionarCentro('0400', this)">
          0400
        </button>
      </div>
    </div>

    <div class="main">
      <div class="config-box">
        <div>
          <label>Centro activo</label>
          <input
            type="text"
            id="centroActivo"
            value="0200"
            readonly
            style="
              width: 80px;
              background: var(--bg-page);
              color: var(--text-muted);
              text-align: center;
              font-weight: 500;
            "
          />
        </div>
        <div>
          <label>Fecha a validar</label>
          <input type="date" id="fechaFiltro" />
        </div>
        <div>
          <label>&nbsp;</label>
          <button class="btn btn-primary" onclick="cargarSheet()">
            Cargar y analizar
          </button>
        </div>
      </div>

      <div class="cards">
        <div class="card">
          <div class="card-label">Registros del dia</div>
          <div class="card-val neutral" id="cTotal">-</div>
        </div>
        <div class="card">
          <div class="card-label">Procesos OK</div>
          <div class="card-val ok" id="cProcOk">-</div>
        </div>
        <div class="card">
          <div class="card-label">Procesos con error</div>
          <div class="card-val err" id="cProcErr">-</div>
        </div>
        <div class="card">
          <div class="card-label">Tiempo muerto</div>
          <div class="card-val warn" id="cDead">-</div>
        </div>
        <div class="card">
          <div class="card-label">A eliminar</div>
          <div class="card-val err" id="cElim">-</div>
        </div>
      </div>

      <div class="status-bar" id="statusBar">
        Selecciona una fecha y presiona "Cargar y analizar"
      </div>

      <div class="tabs">
        <button
          class="tab active"
          id="tab-errores"
          onclick="switchTab('errores')"
        >
          Solo errores
        </button>
        <button class="tab" id="tab-procesos" onclick="switchTab('procesos')">
          Por proceso
        </button>
        <button class="tab" id="tab-actividad" onclick="switchTab('actividad')">
          Actividad procesos
        </button>
      </div>

      <div id="vistaErrores"></div>
      <div id="vistaProcesos" style="display: none"></div>
      <div id="vistaActividad" style="display: none"></div>

      <div class="actions" style="margin-top: 8px">
        <button class="btn" onclick="descargarLimpios()">
          Datos limpios (.xlsx)
        </button>
        <button class="btn" onclick="descargarErrores()">
          Hoja de errores (.xlsx)
        </button>
        <button class="btn" onclick="descargarTiempoMuerto()">
          Tiempo muerto (.xlsx)
        </button>
      </div>
    </div>

    <script>
      // ─────────────────────────────────────────────
      //  CONSTANTES Y CONFIGURACIÓN
      // ─────────────────────────────────────────────
      const PAROS_TIPOS = [
        "MTTO",
        "CALIDAD",
        "MATERIALES",
        "INGENIERIA",
        "PARO",
      ];

      const CENTROS = {
        "0200": {
          sheetUrl:
            "https://docs.google.com/spreadsheets/d/e/2PACX-1vTw2LUlfNDKaPI7jPCGQFehIR4J0B2JGJaeyWGoo3AlXQMcaj8XLESGgBVAdl8s9wDC5uG0j591AxhJ/pub?output=csv",
          // FIX D: eliminado "LIMPIEZA" duplicado (estaba al inicio y al final)
          // FIX B: corregido "FIRBAARMADO" → eliminado (era typo de FIBRAARMADO que ya existe)
          procesos: [
            "PUNTEADORA",
            "PUERTASCARROCERIA",
            "PUERTASCAMARA",
            "PLATAFORMAS2",
            "PLATAFORMAS1",
            "PINTURA2",
            "PANELES",
            "OMS",
            "LIMPIEZA",
            "HENNECKE",
            "ARGON4",
            "ARGON3",
            "ARGON2",
            "ARGON1",
            "ARANAS2",
            "ARANAS1",
            "TORNO2",
            "DISCO",
            "PAILERIA2",
            "PUNZONADORA",
            "CARPINTERIA",
            "PAILERIA5",
            "PAILERIA4",
            "CINTA",
            "PAILERIA1",
            "PB1032",
            "DURMA",
            "PAILERIA3",
            "TORNO1",
            "MOLDURAS",
            "FORRO",
            "LAMINADO",
            "LAMINA",
            "LASER",
            "PINTURA1",
            "ARMADO",
            "SELLADOPISO",
            "ELECTRICOSMONTAJE",
            "MONTAJE",
            "ELECTRICOSPISO",
            "CIERREPUNTOS",
            "ACCESORIOSTAPANCO",
            "RAMPAS",
            "SOLDADURAPISO",
            "COLDIDER",
            "FIBRA",
          ],
          areasPersonal: [
            "HABILITADO",
            "SUB_ENSAMBLE",
            "SUBENSAMBLE",
            "TERMINADO",
          ],
        },
        "0202": {
          sheetUrl: "COLOCA_AQUI_URL_0202", // pendiente de configurar
          procesos: [],
          areasPersonal: null,
        },
        "0400": {
          sheetUrl:
            "https://docs.google.com/spreadsheets/d/e/2PACX-1vSjt9N431H3C64OFNgLEwmc7s59jrPSDv5KAmws8XegmkKVkAdPAJDsANiOsxylZzuZU6WkgOVmDfOT/pub?output=csv",
          procesos: [
            "PAILERIA1",
            "GUILLOTINALAMINA",
            "GUILLOTINAMANUAL",
            "CNC",
            "ROUTER1",
            "REFACCION3",
            "ROUTERMANUAL1",
            "ROUTERMANUAL2",
            "DETALLADOPUERTAS",
            "PUERTASARMADO",
            "PAILERIA2",
            "PAILERIA3",
            "PAILERIA4",
            "PAILERIA5",
            "CORTADORAPAILERIA1",
            "REFACCION2",
            "DOBLADORA",
            "REFACCION1",
            "PRENSA",
            "EMPAQUE",
            "PERFILADORA",
            "RALLADORA",
            "NICROMO",
            "ESCUADRADORA",
            "SUBENSAMBLE",
            "EASYCOVER",
          ],
          areasPersonal: null,
        },
      };

      // ─────────────────────────────────────────────
      //  ESTADO GLOBAL
      // ─────────────────────────────────────────────
      let centroActual = "0200";
      let PROCESOS_VALIDOS = CENTROS["0200"].procesos;
      let todosLosDatos = [];
      let datosDia = [];
      let resultados = [];
      let porProceso = {};

      // ─────────────────────────────────────────────
      //  INICIALIZACIÓN: poner fecha de ayer
      // ─────────────────────────────────────────────
      (function () {
        const ayer = new Date();
        ayer.setDate(ayer.getDate() - 1);
        document.getElementById("fechaFiltro").value = ayer
          .toISOString()
          .split("T")[0];
      })();

      // ─────────────────────────────────────────────
      //  TEMA CLARO / OSCURO (se recuerda entre sesiones)
      // ─────────────────────────────────────────────
      function aplicarTema(tema) {
        document.documentElement.setAttribute("data-theme", tema);
        const btn = document.getElementById("btnTema");
        if (btn) btn.textContent = tema === "dark" ? "☀️" : "🌙";
      }

      function alternarTema() {
        const actual = document.documentElement.getAttribute("data-theme");
        const nuevo = actual === "dark" ? "light" : "dark";
        aplicarTema(nuevo);
        try {
          localStorage.setItem("validadorTema", nuevo);
        } catch (e) {
          // Si localStorage no está disponible, el tema simplemente no persiste
        }
      }

      (function inicializarTema() {
        let temaGuardado = null;
        try {
          temaGuardado = localStorage.getItem("validadorTema");
        } catch (e) {
          temaGuardado = null;
        }
        if (temaGuardado === "dark" || temaGuardado === "light") {
          aplicarTema(temaGuardado);
        } else {
          // Sin preferencia guardada: respeta el modo del sistema operativo si es oscuro
          const prefiereOscuro =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          aplicarTema(prefiereOscuro ? "dark" : "light");
        }
      })();

      // ─────────────────────────────────────────────
      //  UTILIDAD: escapar HTML para evitar XSS
      // ─────────────────────────────────────────────
      function esc(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // ─────────────────────────────────────────────
      //  SELECCIÓN DE CENTRO
      // ─────────────────────────────────────────────
      function seleccionarCentro(centro, btn) {
        centroActual = centro;
        PROCESOS_VALIDOS = CENTROS[centro].procesos;
        document.getElementById("centroActivo").value = centro;
        document
          .querySelectorAll(".centro-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        todosLosDatos = [];
        datosDia = [];
        resultados = [];
        porProceso = {};
        ["vistaErrores", "vistaProcesos", "vistaActividad"].forEach((id) => {
          document.getElementById(id).innerHTML = "";
        });
        setStatus(
          "Centro " + centro + " seleccionado — carga los datos",
          false,
        );
      }

      // ─────────────────────────────────────────────
      //  CAMBIO DE PESTAÑA
      // ─────────────────────────────────────────────
      function switchTab(tab) {
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        const el = document.getElementById("tab-" + tab);
        if (el) el.classList.add("active");
        const vistas = ["errores", "procesos", "actividad"];
        vistas.forEach((v) => {
          document.getElementById(
            "vista" + v.charAt(0).toUpperCase() + v.slice(1),
          ).style.display = v === tab ? "" : "none";
        });
        if (tab === "actividad") renderActividad();
      }

      // ─────────────────────────────────────────────
      //  LÓGICA DE CLASIFICACIÓN Y VALIDACIÓN
      // ─────────────────────────────────────────────
      function extraerProceso(evento) {
        const up = evento.toUpperCase();
        // Ordenar de más largo a más corto para que "CORTADORAPAILERIA1"
        // se evalúe antes que "PAILERIA1" y no haya falsos matches
        const ordenados = [...PROCESOS_VALIDOS].sort(
          (a, b) => b.length - a.length,
        );
        for (const p of ordenados) {
          if (up.endsWith(p)) return p;
        }
        return null;
      }

      function clasificar(evento) {
        if (/AP[\s_]ERROR/.test(evento)) return "AP_ERROR";
        if (/SIN_DEMANDA/.test(evento)) return "SIN_DEMANDA";
        if (/SIN_OPERADOR/.test(evento)) return "SIN_OPERADOR";
        if (/^TERMINO_OPERACIONES/.test(evento) || /_TERMINO_/.test(evento))
          return "TERMINO";
        if (/_OPERACIONES_/.test(evento)) return "OPERACIONES";
        for (const tipo of PAROS_TIPOS) {
          if (new RegExp("_" + tipo + "_").test(evento)) return "PARO";
        }
        if (/^\d{6}_/.test(evento)) return "PERSONAL";
        return "DESCONOCIDO";
      }

      function validarDigitos(evento) {
        const parteOrden = evento.split("_")[0];
        if (!parteOrden) return true;
        if (/^\d{6}$/.test(parteOrden)) return true;
        const segmentos = parteOrden.split(/[AB]/);
        for (const seg of segmentos) {
          if (/^\d+$/.test(seg) && seg.length !== 8) return false;
        }
        return true;
      }

      // Duplicados: solo aplica a eventos PERSONAL.
      // OPERACIONES, PARO y TERMINO pueden repetirse válidamente en el día
      // (un proceso puede arrancar → parar → arrancar → terminar con la misma orden).
      const TIPOS_NO_DUPLICABLES = new Set([
        "OPERACIONES",
        "PARO",
        "TERMINO",
        "SIN_DEMANDA",
        "SIN_OPERADOR",
      ]);

      function marcarDuplicados(datos) {
        const seen = new Set();
        return datos.map((d) => {
          const tipo = clasificar(d.evento);
          // Si el tipo no es duplicable, nunca lo marcamos como duplicado
          if (TIPOS_NO_DUPLICABLES.has(tipo)) {
            return { ...d, duplicado: false };
          }
          const key = d.evento.trim().toUpperCase();
          const dup = seen.has(key);
          seen.add(key);
          return { ...d, duplicado: dup };
        });
      }

      function parseFecha(str) {
        if (!str) return new Date(0);
        const partes = str.trim().split(" ");
        const fecha = partes[0] || "";
        const hora = partes[1] || "00:00:00";
        const hms = hora.split(":");
        const h = (hms[0] || "0").padStart(2, "0");
        const m = hms[1] || "00";
        const s = hms[2] || "00";
        const d = new Date(fecha + "T" + h + ":" + m + ":" + s);
        return isNaN(d) ? new Date(0) : d;
      }

      // ─────────────────────────────────────────────
      //  COMPARACIÓN DE ÓRDENES CON TOLERANCIA A TYPOS
      // ─────────────────────────────────────────────
      // Distancia de Levenshtein: número mínimo de inserciones / eliminaciones /
      // sustituciones de un solo carácter para convertir "a" en "b".
      // La usamos para no confundir un error de captura de un dígito
      // (ej. "1004504" en vez de "10048504") con un cambio real de orden de producción.
      function distanciaLevenshtein(a, b) {
        const m = a.length,
          n = b.length;
        const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
        for (let i = 0; i <= m; i++) dp[i][0] = i;
        for (let j = 0; j <= n; j++) dp[0][j] = j;
        for (let i = 1; i <= m; i++) {
          for (let j = 1; j <= n; j++) {
            if (a[i - 1] === b[j - 1]) dp[i][j] = dp[i - 1][j - 1];
            else
              dp[i][j] =
                1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
          }
        }
        return dp[m][n];
      }

      // Dos números de orden se consideran "la misma orden" si son idénticos,
      // o si ambos son puramente numéricos y difieren por un solo dígito
      // (insertado, eliminado o cambiado) — es decir, un probable error de captura.
      // Las órdenes compuestas con letras (ej. "10047624A10047637") deben coincidir
      // exactamente, porque ahí un error de captura es más grave de confundir.
      function ordenesCasiIguales(a, b) {
        if (a === b) return true;
        if (!/^\d+$/.test(a) || !/^\d+$/.test(b)) return false;
        if (Math.abs(a.length - b.length) > 1) return false;
        return distanciaLevenshtein(a, b) <= 1;
      }

      // Extrae el número de orden de un evento de flujo.
      // Devuelve null para el formato genérico "TERMINO_OPERACIONES_centro_proceso",
      // que no lleva número de orden y cierra la orden que esté abierta en ese momento.
      function extraerOrdenDeFlujo(evento) {
        if (/^TERMINO_OPERACIONES/.test(evento)) return null;
        return evento.split("_")[0] || null;
      }

      // ─────────────────────────────────────────────
      //  VALIDACIÓN DE FLUJO (por proceso, cronológica)
      // ─────────────────────────────────────────────
      // Reglas de negocio confirmadas:
      //  1. Un proceso puede empezar el día directamente en PARO, sin OPERACIONES previa.
      //  2. Un PARO no necesita compartir número de orden con la OPERACIONES vigente
      //     para esta validación (los typos de dígitos ya se reportan aparte en validarDigitos).
      //  3. Si entra una OPERACIONES de una orden distinta a la que ya estaba abierta
      //     (sin haber visto su TERMINO), eso es un flujo inválido real: la orden anterior
      //     se quedó sin cerrar. Se tolera 1 dígito de diferencia como posible typo de captura.
      //  4. Un TERMINO sin ninguna OPERACIONES antes en su ciclo es inválido.
      //  5. Un PARO inmediatamente antes del TERMINO, sin volver a OPERACIONES, es inválido.
      //  6. Al final del día: si queda una orden abierta en PARO, es tiempo muerto a cerrar;
      //     si queda abierta en OPERACIONES, es un ciclo sin TERMINO.
      //
      // Devuelve un arreglo de problemas (vacío si el flujo es válido). Cada problema
      // incluye la hora del registro donde se detectó, para señalar la fila exacta.
      function validarFlujo(registros) {
        const flujo = registros.filter(
          (r) =>
            r.tipo === "OPERACIONES" ||
            r.tipo === "PARO" ||
            r.tipo === "TERMINO",
        );
        if (!flujo.length) return [];

        const problemas = [];
        let ordenAbierta = null;
        let huboOperacionesEnCiclo = false;
        let ultimoFueParo = false;

        for (const reg of flujo) {
          if (reg.tipo === "OPERACIONES") {
            const ordenDeEvento = extraerOrdenDeFlujo(reg.evento);
            if (
              ordenAbierta !== null &&
              ordenDeEvento !== null &&
              ordenDeEvento !== ordenAbierta &&
              !ordenesCasiIguales(ordenDeEvento, ordenAbierta)
            ) {
              problemas.push({
                fecha: reg.fecha,
                motivo:
                  "La orden " +
                  ordenAbierta +
                  " nunca tuvo TERMINO antes de iniciar la orden " +
                  ordenDeEvento,
              });
            }
            if (ordenAbierta === null) ordenAbierta = ordenDeEvento;
            huboOperacionesEnCiclo = true;
            ultimoFueParo = false;
          } else if (reg.tipo === "PARO") {
            ultimoFueParo = true;
          } else if (reg.tipo === "TERMINO") {
            if (!huboOperacionesEnCiclo) {
              problemas.push({
                fecha: reg.fecha,
                motivo: "Hay un TERMINO sin OPERACIONES previa",
              });
            }
            if (ultimoFueParo && huboOperacionesEnCiclo) {
              problemas.push({
                fecha: reg.fecha,
                motivo:
                  "Hay un PARO sin retorno a OPERACIONES antes del TERMINO",
              });
            }
            ordenAbierta = null;
            huboOperacionesEnCiclo = false;
            ultimoFueParo = false;
          }
        }

        // Al terminar el día, ¿quedó algo sin cerrar?
        if (ordenAbierta !== null || huboOperacionesEnCiclo) {
          const ultimaHora = flujo[flujo.length - 1].fecha;
          if (ultimoFueParo) {
            problemas.push({
              fecha: ultimaHora,
              tiempoMuerto: true,
              motivo:
                "Paro sin retorno a operaciones ni termino — agregar OPERACIONES y TERMINO a las 23:00",
            });
          } else {
            problemas.push({
              fecha: ultimaHora,
              motivo:
                "Hay OPERACIONES sin TERMINO al final del día — el último ciclo no se cerró",
            });
          }
        }

        return problemas;
      }

      // ─────────────────────────────────────────────
      //  CARGA DEL SHEET
      // ─────────────────────────────────────────────
      async function cargarSheet() {
        // FIX G: validar que la URL esté configurada antes de hacer fetch
        const url = CENTROS[centroActual].sheetUrl;
        if (!url || url.startsWith("COLOCA")) {
          setStatus(
            "El centro " + centroActual + " no tiene URL configurada aún",
            false,
          );
          return;
        }
        setStatus("Cargando datos del Google Sheet...", true);
        try {
          const res = await fetch(url);
          const text = await res.text();
          const filas = text.trim().split("\n").slice(1);
          todosLosDatos = filas
            .map((f) => {
              let fecha = "",
                evento = "";
              if (f.charAt(0) === '"') {
                const m = f.match(/^"([^"]+)","?(.+?)"?$/);
                if (m) {
                  fecha = m[1].trim();
                  evento = m[2].trim();
                }
              } else {
                const idx = f.indexOf(",");
                if (idx > 0) {
                  fecha = f.substring(0, idx).trim();
                  evento = f
                    .substring(idx + 1)
                    .trim()
                    .replace(/^"|"$/g, "");
                }
              }
              return fecha && evento ? { fecha, evento } : null;
            })
            .filter(Boolean);

          const fechaSel = document.getElementById("fechaFiltro").value;
          analizar(fechaSel);
        } catch (e) {
          setStatus("Error al cargar Sheet: " + e.message, false);
        }
      }

      // ─────────────────────────────────────────────
      //  ANÁLISIS PRINCIPAL
      // ─────────────────────────────────────────────
      function analizar(fechaSel) {
        if (!fechaSel) {
          setStatus("Selecciona una fecha", false);
          return;
        }

        const brutos = todosLosDatos
          .filter((d) => d.fecha.trim().split(" ")[0] === fechaSel)
          .sort((a, b) => parseFecha(a.fecha) - parseFecha(b.fecha));

        if (!brutos.length) {
          setStatus("No hay registros para el " + fechaSel, false);
          return;
        }

        // FIX C: marcar duplicados con Set en O(n)
        datosDia = marcarDuplicados(brutos);

        resultados = datosDia.map((d) => {
          const tipo = clasificar(d.evento);
          const proc = extraerProceso(d.evento);
          let estado = "ok",
            nota = "",
            accion = "";

          if (d.duplicado) {
            estado = "err";
            nota = "Duplicado";
            accion = "Eliminar";
          } else if (tipo === "AP_ERROR") {
            estado = "err";
            nota = "AP ERROR";
            accion = "Eliminar";
          } else if (!validarDigitos(d.evento)) {
            estado = "warn";
            nota = "Dígitos incorrectos en orden de producción";
            accion = "Revisar y corregir";
            // FIX I: avisar eventos DESCONOCIDOS en vez de dejarlos pasar como ok
          } else if (tipo === "DESCONOCIDO") {
            estado = "warn";
            nota = "Tipo de evento no reconocido";
            accion = "Revisar";
          }
          return {
            fecha: d.fecha,
            evento: d.evento,
            tipo,
            proceso: proc,
            estado,
            nota,
            accion,
          };
        });

        porProceso = {};
        for (const r of resultados) {
          if (!r.proceso) continue;
          if (!porProceso[r.proceso]) porProceso[r.proceso] = [];
          porProceso[r.proceso].push(r);
        }

        for (const proc of Object.keys(porProceso)) {
          porProceso[proc].sort(
            (a, b) => parseFecha(a.fecha) - parseFecha(b.fecha),
          );
          const regsValidos = porProceso[proc].filter((r) => r.estado === "ok");
          const problemas = validarFlujo(regsValidos);
          if (problemas.length) {
            // Por cada problema detectado, buscamos el registro de flujo con esa
            // fecha exacta y lo marcamos — así se señala la línea específica del
            // error en vez de culpar a todo el proceso del día completo.
            for (const problema of problemas) {
              const reg = porProceso[proc].find(
                (r) =>
                  r.fecha === problema.fecha &&
                  r.estado === "ok" &&
                  (r.tipo === "OPERACIONES" ||
                    r.tipo === "PARO" ||
                    r.tipo === "TERMINO"),
              );
              if (!reg) continue;
              if (problema.tiempoMuerto) {
                reg.estado = "dead";
                reg.nota = "Tiempo muerto: " + problema.motivo;
                reg.accion = "Agregar OPERACIONES y TERMINO a las 23:00";
              } else {
                reg.estado = "flujo";
                reg.nota = "Flujo inválido en " + proc + ": " + problema.motivo;
                reg.accion = "Revisar y corregir el flujo de este proceso";
              }
            }
          }
        }

        actualizarContadores();
        renderVistas();
        setStatus(
          "OK — " + datosDia.length + " registros analizados del " + fechaSel,
          false,
        );
      }

      // ─────────────────────────────────────────────
      //  CONTADORES
      // ─────────────────────────────────────────────
      function actualizarContadores() {
        let procOk = 0,
          procErr = 0,
          dead = 0,
          elim = 0;
        for (const regs of Object.values(porProceso)) {
          const tieneErr = regs.some(
            (r) => r.estado === "flujo" || r.estado === "dead",
          );
          const tieneDead = regs.some((r) => r.estado === "dead");
          if (tieneErr) procErr++;
          else procOk++;
          if (tieneDead) dead++;
        }
        for (const r of resultados) {
          if (r.estado === "err") elim++;
        }
        document.getElementById("cTotal").textContent = datosDia.length;
        document.getElementById("cProcOk").textContent = procOk;
        document.getElementById("cProcErr").textContent = procErr;
        document.getElementById("cDead").textContent = dead;
        document.getElementById("cElim").textContent = elim;
      }

      // ─────────────────────────────────────────────
      //  RENDERIZADO DE VISTAS
      // ─────────────────────────────────────────────
      function renderVistas() {
        renderErrores();
        renderProcesos();
        renderActividad();
      }

      // ── Botón copiar evento ──────────────────────
      // Genera un botón que al clicar copia el texto al portapapeles
      function btnCopiar(texto) {
        const id = "cp_" + Math.random().toString(36).slice(2, 8);
        // Usamos setTimeout para adjuntar el listener después de que el DOM exista
        setTimeout(() => {
          const btn = document.getElementById(id);
          if (!btn) return;
          btn.addEventListener("click", () => {
            navigator.clipboard
              .writeText(texto)
              .then(() => {
                btn.textContent = "✓ Copiado";
                btn.classList.add("copied");
                setTimeout(() => {
                  btn.textContent = "Copiar";
                  btn.classList.remove("copied");
                }, 1500);
              })
              .catch(() => {
                // Fallback para navegadores sin clipboard API
                const ta = document.createElement("textarea");
                ta.value = texto;
                ta.style.position = "fixed";
                ta.style.opacity = "0";
                document.body.appendChild(ta);
                ta.select();
                document.execCommand("copy");
                document.body.removeChild(ta);
                btn.textContent = "✓ Copiado";
                btn.classList.add("copied");
                setTimeout(() => {
                  btn.textContent = "Copiar";
                  btn.classList.remove("copied");
                }, 1500);
              });
          });
        }, 0);
        return `<button id="${id}" class="btn-copy">Copiar</button>`;
      }

      // ── Tabla genérica ───────────────────────────
      function buildTable(filas, mostrarNota) {
        const badgeMap = {
          ok: ["badge-ok", "Válido"],
          err: ["badge-err", "Eliminar"],
          warn: ["badge-warn", "Revisar"],
          flujo: ["badge-err", "Flujo inválido"],
          dead: ["badge-dead", "Tiempo muerto"],
        };
        const rowMap = {
          err: "row-err",
          warn: "row-warn",
          flujo: "row-err",
          dead: "row-dead",
          ok: "",
        };

        let html =
          '<div class="table-wrap"><table><thead><tr>' +
          "<th>#</th><th>Hora</th><th>Evento</th><th>Copiar</th><th>Tipo</th><th>Estado</th>";
        if (mostrarNota) html += "<th>Nota</th>";
        html += "</tr></thead><tbody>";

        for (let i = 0; i < filas.length; i++) {
          const r = filas[i];
          const bm = badgeMap[r.estado] || ["badge-warn", "?"];
          const hora = r.fecha.length > 10 ? r.fecha.substring(11) : r.fecha;
          html += `<tr class="${rowMap[r.estado] || ""}">`;
          html += `<td style="color:#aaa;font-size:12px">${i + 1}</td>`;
          html += `<td class="fecha-cell">${esc(hora)}</td>`;
          html += `<td class="evento-cell">${esc(r.evento)}</td>`;
          html += `<td>${btnCopiar(r.evento)}</td>`;
          html += `<td style="font-size:12px;color:#666">${esc(r.tipo)}</td>`;
          html += `<td><span class="badge ${bm[0]}">${bm[1]}</span></td>`;
          if (mostrarNota)
            html += `<td class="nota-cell">${esc(r.nota || "")}</td>`;
          html += "</tr>";
        }
        html += "</tbody></table></div>";
        return html;
      }

      // ── Vista "Solo errores" ─────────────────────
      function renderErrores() {
        const cont = document.getElementById("vistaErrores");
        const errs = resultados.filter((r) => r.estado !== "ok");
        if (!errs.length) {
          cont.innerHTML =
            '<div class="table-wrap"><table><tbody>' +
            '<tr><td class="empty-state" colspan="7">Sin errores detectados</td></tr>' +
            "</tbody></table></div>";
        } else {
          cont.innerHTML = buildTable(errs, true);
        }
      }

      // ── Vista "Por proceso" con filtro ───────────
      function renderProcesos() {
        const cont = document.getElementById("vistaProcesos");
        const procs = Object.keys(porProceso);
        if (!procs.length) {
          cont.innerHTML =
            '<div class="table-wrap"><table><tbody>' +
            '<tr><td class="empty-state" colspan="7">Sin datos de procesos</td></tr>' +
            "</tbody></table></div>";
          return;
        }

        // Construir barra de filtros
        const opcionesEstado = `
          <option value="">Todos los estados</option>
          <option value="ok">Solo OK</option>
          <option value="err">Con errores</option>
        `;
        const opcionesProceso = procs
          .map((p) => `<option value="${esc(p)}">${esc(p)}</option>`)
          .join("");

        cont.innerHTML = `
          <div class="filter-bar">
            <input type="text" id="filtroProcesoTexto" placeholder="Buscar proceso…"
              oninput="filtrarProcesos()" />
            <select id="filtroProcesoEstado" onchange="filtrarProcesos()">
              ${opcionesEstado}
            </select>
            <select id="filtroProcesoNombre" onchange="filtrarProcesos()">
              <option value="">Todos los procesos</option>
              ${opcionesProceso}
            </select>
            <span class="filter-results" id="filtroResultados"></span>
          </div>
          <div id="listaProcesos"></div>
        `;
        filtrarProcesos(); // render inicial con todos
      }

      function filtrarProcesos() {
        const texto = (
          document.getElementById("filtroProcesoTexto")?.value || ""
        )
          .trim()
          .toUpperCase();
        const estado =
          document.getElementById("filtroProcesoEstado")?.value || "";
        const nombre =
          document.getElementById("filtroProcesoNombre")?.value || "";
        const lista = document.getElementById("listaProcesos");
        if (!lista) return;

        const procs = Object.keys(porProceso);
        let visibles = 0;
        let html = "";

        for (const proc of procs) {
          // Filtro por nombre exacto (select)
          if (nombre && proc !== nombre) continue;
          // Filtro por texto libre
          if (texto && !proc.toUpperCase().includes(texto)) continue;
          // Filtro por estado
          const regs = porProceso[proc];
          const tieneError = regs.some(
            (r) =>
              r.estado === "err" || r.estado === "flujo" || r.estado === "dead",
          );
          if (estado === "ok" && tieneError) continue;
          if (estado === "err" && !tieneError) continue;

          visibles++;
          const badge = tieneError
            ? '<span class="badge badge-err">Con errores</span>'
            : '<span class="badge badge-ok">OK</span>';

          html += `<div class="proceso-group">
            <div class="proceso-header">
              <span class="proceso-nombre">${esc(proc)}</span>${badge}
              <span style="font-size:11px;color:#aaa;margin-left:auto">${regs.length} registro(s)</span>
            </div>
            ${buildTable(regs, false)}
          </div>`;
        }

        if (!visibles) {
          html =
            '<div class="table-wrap"><table><tbody>' +
            '<tr><td class="empty-state" colspan="7">Ningún proceso coincide con el filtro</td></tr>' +
            "</tbody></table></div>";
        }

        lista.innerHTML = html;
        document.getElementById("filtroResultados").textContent =
          visibles + " de " + Object.keys(porProceso).length + " proceso(s)";
      }

      // ── Vista "Actividad procesos" ───────────────
      function renderActividad() {
        const cont = document.getElementById("vistaActividad");
        if (!resultados.length) {
          cont.innerHTML =
            '<div class="table-wrap"><table><tbody>' +
            '<tr><td class="empty-state" colspan="4">Carga los datos del día primero</td></tr>' +
            "</tbody></table></div>";
          return;
        }
        const procesos = CENTROS[centroActual].procesos;
        const personalPorProceso = {};
        for (const p of procesos) personalPorProceso[p] = 0;
        for (const r of resultados) {
          if (
            r.tipo === "PERSONAL" &&
            r.proceso &&
            personalPorProceso[r.proceso] !== undefined
          ) {
            personalPorProceso[r.proceso]++;
          }
        }
        const activos = procesos.filter((p) => personalPorProceso[p] > 0);
        const ausentes = procesos.filter((p) => personalPorProceso[p] === 0);

        let html = `
          <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
            <div class="card" style="flex:1;min-width:120px">
              <div class="card-label">Total procesos</div>
              <div class="card-val neutral">${procesos.length}</div>
            </div>
            <div class="card" style="flex:1;min-width:120px">
              <div class="card-label">Activos</div>
              <div class="card-val ok">${activos.length}</div>
            </div>
            <div class="card" style="flex:1;min-width:120px">
              <div class="card-label">Sin personal</div>
              <div class="card-val err">${ausentes.length}</div>
            </div>
          </div>
          <div class="table-wrap"><table>
            <thead><tr><th>#</th><th>Proceso</th><th>Personal registrado</th><th>Estado</th></tr></thead>
            <tbody>`;

        const todos = [
          ...activos.map((p) => ({
            proceso: p,
            count: personalPorProceso[p],
            estado: "activo",
          })),
          ...ausentes.map((p) => ({ proceso: p, count: 0, estado: "ausente" })),
        ];
        todos.forEach((item, t) => {
          const badge =
            item.estado === "activo"
              ? '<span class="badge badge-ok">Activo</span>'
              : '<span class="badge badge-err">Sin personal</span>';
          const rowCls = item.estado === "ausente" ? "row-err" : "";
          html += `<tr class="${rowCls}">
            <td style="color:#aaa;font-size:12px">${t + 1}</td>
            <td style="font-weight:500">${esc(item.proceso)}</td>
            <td style="font-size:12px;color:#666">${item.count > 0 ? item.count + " persona(s)" : "—"}</td>
            <td>${badge}</td>
          </tr>`;
        });
        html += "</tbody></table></div>";
        cont.innerHTML = html;
      }


      function descargarLimpios() {
        if (!resultados.length) {
          alert("Carga los datos primero");
          return;
        }
        const filas = resultados
          .filter((r) => r.estado !== "err")
          .map((r) => ({
            Fecha: r.fecha,
            Evento: r.evento,
            Tipo: r.tipo,
            Proceso: r.proceso || "",
            Estado: r.estado === "ok" ? "Válido" : r.nota,
          }));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(
          wb,
          XLSX.utils.json_to_sheet(filas),
          "Datos Limpios",
        );
        const f = document
          .getElementById("fechaFiltro")
          .value.replace(/-/g, "");
        XLSX.writeFile(
          wb,
          "flujos_limpios_" + centroActual + "_" + f + ".xlsx",
        );
      }

      function descargarErrores() {
        if (!resultados.length) {
          alert("Carga los datos primero");
          return;
        }
        const filas = resultados
          .filter(
            (r) =>
              r.estado === "err" || r.estado === "warn" || r.estado === "flujo",
          )
          .map((r) => ({
            Fecha: r.fecha,
            Evento: r.evento,
            Tipo: r.tipo,
            Proceso: r.proceso || "",
            Error: r.nota,
            Accion: r.accion,
          }));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(
          wb,
          XLSX.utils.json_to_sheet(filas),
          "Errores",
        );
        const f = document
          .getElementById("fechaFiltro")
          .value.replace(/-/g, "");
        XLSX.writeFile(wb, "errores_" + centroActual + "_" + f + ".xlsx");
      }

      function descargarTiempoMuerto() {
        if (!resultados.length) {
          alert("Carga los datos primero");
          return;
        }
        const filas = resultados
          .filter((r) => r.estado === "dead")
          .map((r) => ({
            Fecha: r.fecha,
            Evento: r.evento,
            Proceso: r.proceso || "",
            Nota: r.nota,
          }));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(
          wb,
          XLSX.utils.json_to_sheet(filas),
          "Tiempo Muerto",
        );
        const f = document
          .getElementById("fechaFiltro")
          .value.replace(/-/g, "");
        XLSX.writeFile(wb, "tiempo_muerto_" + centroActual + "_" + f + ".xlsx");
      }

      // ─────────────────────────────────────────────
      //  STATUS BAR
      // ─────────────────────────────────────────────
      function setStatus(msg, cargando) {
        const bar = document.getElementById("statusBar");
        bar.innerHTML = cargando
          ? '<div class="spinner"></div> ' + esc(msg)
          : esc(msg);
      }
    </script>
  </body>
</html>
